<!DOCTYPE html>
<html>
<head>
    <title>Courses Cards</title>

    <style>
        body{
            font-family: Arial;
            background:#08d1f0;
            text-align:center;
            margin:0;
        }

        h1{
            background:#e8e8e3;
            color:rgb(145, 75, 75);
            padding:20px;
            margin:0;
        }

        .container{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:25px;
            padding:40px;
        }

        .card{
            background:white;
            color:black;
            width:390px;
            padding:20px;
            border-radius:12px;
            box-shadow:0 5px 15px rgb(252, 233, 233);
        }

        .hero-img{
            width:350px;
            height: 280px;
            object-fit:cover;
            border-radius:8px;
        }

        .card-title{
            font-size:20px;
            font-weight:bold;
            margin-top:10px;
        }

        .card-text{
            margin:10px 0;
        }

        .card-btn{
            display:inline-block;
            padding:8px 16px;
            background:#1cb4b9;
            color:white;
            text-decoration:none;
            border-radius:6px;
        }

        .card-btn:hover{
            background:black;
        }
    </style>
</head>

<body>

<h1>Our Courses</h1>

<div class="container">

    <!-- Card 1 -->
    <div class="card">
        <img src="batsmen.jpg" alt="Batsmem" class="hero-img">
        <div class="card-title">Batsmem</div>
        <div class="card-text">Right/left Batting</div>
        <a href="#" class="card-btn">Select</a>
    </div>

    <!-- Card 2 -->
    <div class="card">
        <img src="bowling.jpg" alt="Bowling" class="hero-img">
        <div class="card-title">Bowling</div>
        <div class="card-text">Right/left Bowling</div>
        <a href="#" class="card-btn">Select</a>
    </div>

    <!-- Card 3 -->
    <div class="card">
        <img src="images.jpg" alt="All-Rounder" class="hero-img">
        <div class="card-title">All-Rounder</div>
        <div class="card-text">Type of bowling and batting</div>
        <a href="#" class="card-btn">Select</a>
    </div>

</div>

</body>
</html>
