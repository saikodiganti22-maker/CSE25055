V<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family: Arial;
        background: lightgray;
        margin: 0;
      }

      .products {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        padding: 20px;
      }

      .card {
        background: white;
        padding: 15px;
        text-align: center;
        border-radius: 10px;
        box-shadow: 0px 2px 8px gray;
      }

      .card img {
        width: 120px;
        height: 120px;
      }

      .card h3 {
        margin: 10px 0 5px;
      }

      .price {
        color: green;
        font-weight: bold;
      }

      button {
        background: blue;
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 5px;
        cursor: pointer;
      }

      button:hover {
        background: darkblue;
      }
    </style>
  </head>

  <body>
    <div class="products">
      <div class="card">
        <img src="smartwatch.webp" />
        <h3>Smart Watch</h3>
        <p class="price">₹1999</p>
        <button>Add to Cart</button>
      </div>

      <div class="card">
        <img src="headphones.jpg.jpeg" />
        <h3>Headphones</h3>
        <p class="price">₹2999</p>
        <button>Add to Cart</button>
      </div>

      <div class="card">
        <img src="laptop.jpg.jpeg" />
        <h3>Laptop</h3>
        <p class="price">₹45999</p>
        <button>Add to Cart</button>
      </div>

      <div class="card">
        <img src="bluetooth.jpg.jpeg" />
        <h3>Bluetooth Speaker</h3>
        <p class="price">₹2499</p>
        <button>Add to Cart</button>
      </div>
    </div>
  </body>
</html>
