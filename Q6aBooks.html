<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family: Arial;
        background: lightgray;
        margin: 0;
      }

      .products {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        padding: 20px;
      }

      .card {
        background: white;
        padding: 15px;
        text-align: center;
        border-radius: 10px;
        box-shadow: 0px 2px 8px gray;
      }

      .card img {
        width: 120px;
        height: 120px;
      }

      .price {
        color: green;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="products">
      <div class="card">
        <img src="book.jpg.jpeg" />
        <h3>Programming Book</h3>
        <p class="price">₹499</p>
      </div>

      <div class="card">
        <img src="science (1).webp" />
        <h3>Science Book</h3>
        <p class="price">₹399</p>
      </div>

      <div class="card">
        <img src="math.webp" />
        <h3>Math Book</h3>
        <p class="price">₹349</p>
      </div>

      <div class="card">
        <img src="social.jpg.jpeg" />
        <h3>Social Book</h3>
        <p class="price">₹599</p>
      </div>
    </div>
  </body>
</html>
